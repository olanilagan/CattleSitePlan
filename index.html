<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lot 3410-A · Structure Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Barlow',sans-serif;overflow:hidden;background:#090c10;color:#e6edf3}
#app{display:flex;height:100vh}

/* ─── SIDEBAR ─── */
#sidebar{
  width:290px;min-width:290px;
  background:#0d1117;
  border-right:1px solid #21262d;
  display:flex;flex-direction:column;overflow:hidden;
}
#hdr{padding:14px 16px 12px;border-bottom:1px solid #21262d}
.badge{
  font-family:'Share Tech Mono',monospace;
  font-size:9px;color:#484f58;
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;
}
#hdr h1{
  font-family:'Barlow Condensed',sans-serif;
  font-size:24px;font-weight:700;line-height:1.1;color:#e6edf3;
}
.sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:#7d8590;margin-top:3px}
.chips{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.chip{
  font-family:'Share Tech Mono',monospace;font-size:10px;
  padding:2px 8px;border-radius:2px;
  background:rgba(240,165,0,.1);border:1px solid rgba(240,165,0,.25);color:#d29922;
}
.chip.dim{background:rgba(125,133,144,.06);border-color:rgba(125,133,144,.2);color:#7d8590}

/* ─── CARDS ─── */
#cards{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
#cards::-webkit-scrollbar{width:3px}
#cards::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px}

.card{
  background:#161b22;border:1px solid #21262d;border-radius:6px;
  padding:12px 12px 10px;position:relative;overflow:hidden;
  transition:border-color .15s,background .15s;
}
.card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c)}
.card.dragging{border-color:var(--c);background:#1c2128}
.card:hover{border-color:rgba(var(--cr),.4);background:#1a1f27}

.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.card-name{
  font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;
  color:#e6edf3;line-height:1.2;cursor:pointer;
}
.card-name:hover{color:var(--c)}
.card-dims{font-family:'Share Tech Mono',monospace;font-size:10px;color:#7d8590;margin-top:2px}
.card-dims em{color:var(--c);font-style:normal;font-weight:600}
.card-icon{font-size:22px;line-height:1}
.card-coord{font-family:'Share Tech Mono',monospace;font-size:9px;color:#484f58;margin-top:4px}

.status{
  display:inline-flex;align-items:center;gap:4px;
  font-family:'Share Tech Mono',monospace;font-size:9px;
  padding:2px 7px;border-radius:2px;letter-spacing:.04em;transition:all .25s;
}
.st-in{ background:rgba(63,185,80,.1); border:1px solid rgba(63,185,80,.3); color:#3fb950}
.st-pt{ background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.3);color:#d29922}
.st-out{background:rgba(248,81,73,.1); border:1px solid rgba(248,81,73,.3); color:#f85149}

.card-btns{display:flex;gap:5px;margin-top:8px}
.btn{
  flex:1;padding:5px 6px;
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:.07em;text-transform:uppercase;
  border:1px solid #30363d;border-radius:3px;
  background:transparent;color:#7d8590;cursor:pointer;transition:all .15s;
}
.btn:hover{background:#21262d;color:#e6edf3;border-color:#484f58}
.btn.primary{border-color:var(--c);color:var(--c)}
.btn.primary:hover{background:var(--c);color:#090c10;font-weight:700}

/* ─── FOOTER ─── */
#ftr{padding:10px 14px;border-top:1px solid #21262d}
.hint{
  font-family:'Share Tech Mono',monospace;font-size:9px;
  color:#484f58;line-height:1.7;margin-bottom:7px;letter-spacing:.03em;
}
#reset-btn{
  width:100%;padding:6px;background:transparent;
  border:1px solid #30363d;border-radius:4px;
  color:#7d8590;font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;transition:all .15s;
}
#reset-btn:hover{border-color:#f85149;color:#f85149}

/* ─── MAP ─── */
#map{flex:1;background:#000}
.leaflet-container{background:#0a0d12}

/* Structure tooltips */
.struct-tip{
  background:rgba(9,12,16,.88)!important;
  border:1px solid rgba(255,255,255,.1)!important;
  border-radius:2px!important;
  color:#e6edf3!important;
  font-family:'Share Tech Mono',monospace!important;
  font-size:8px!important;
  padding:1px 5px!important;
  white-space:nowrap!important;
  pointer-events:none!important;
  line-height:1.4!important;
  box-shadow:0 2px 6px rgba(0,0,0,.5)!important;
}
.struct-tip::before{display:none!important}

/* Map legend */
.map-legend{
  background:rgba(13,17,23,.9);border:1px solid #30363d;
  border-radius:5px;padding:9px 11px;
  font-family:'Share Tech Mono',monospace;font-size:9px;color:#7d8590;
  letter-spacing:.04em;
}
.leg-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;white-space:nowrap}
.leg-row:last-child{margin-bottom:0}
.leg-line{width:20px;height:0}

/* ─── ROTATION CONTROLS ─── */
.rot-row{display:flex;align-items:center;gap:5px;margin-top:8px}
.rot-label{
  font-family:'Share Tech Mono',monospace;font-size:9px;color:#484f58;
  white-space:nowrap;min-width:18px;
}
.rot-angle{
  font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--c);
  min-width:36px;text-align:right;font-weight:600;
}
.rot-slider{
  flex:1;-webkit-appearance:none;appearance:none;
  height:4px;border-radius:2px;
  background:#21262d;outline:none;cursor:pointer;
}
.rot-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:14px;height:14px;border-radius:50%;
  background:var(--c);cursor:grab;border:2px solid #0d1117;
  box-shadow:0 0 4px rgba(0,0,0,.4);
}
.rot-slider::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;
  background:var(--c);cursor:grab;border:2px solid #0d1117;
}
.rot-btn{
  width:24px;height:24px;padding:0;
  font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700;
  border:1px solid #30363d;border-radius:3px;
  background:transparent;color:#7d8590;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.rot-btn:hover{background:#21262d;color:#e6edf3;border-color:#484f58}
</style>
</head>
<body>
<div id="app">

<aside id="sidebar">
  <div id="hdr">
    <div class="badge">📍 Brgy. San Juan · Alitagtag · Batangas</div>
    <h1>Lot 3410-A</h1>
    <div class="sub">CSD-04-005613-D &nbsp;·&nbsp; 14,922 sqm</div>
    <div class="chips">
      <span class="chip" id="fp-chip">FOOTPRINT — 780 sqm</span>
      <span class="chip dim" id="pct-chip">5.23% USED</span>
    </div>
  </div>
  <div id="cards"></div>
  <div id="ftr">
    <div class="hint">
      DRAG structures on the map to reposition<br>
      SLIDER or ↶↷ buttons to rotate any angle<br>
      Click name or ⤢ to zoom · RESET to start over
    </div>
    <button id="reset-btn" onclick="resetAll()">↺ Reset All Positions</button>
  </div>
</aside>

<div id="map"></div>
</div>

<script>
// ════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════
const LAT_M = 1 / 111139;
const LNG_M = 1 / (111139 * Math.cos(13.86 * Math.PI / 180));
const DEG2R = Math.PI / 180;

// ════════════════════════════════════════════════
// POLYGON DATA
// ════════════════════════════════════════════════
const GE_PLOT = [
  [13.86048,121.00900],[13.85867,121.00910],[13.85870,121.01011],
  [13.85902,121.01008],[13.85930,121.01004],[13.85947,121.01000],
  [13.85951,121.00998],[13.85953,121.00997],[13.85957,121.00992],
  [13.85961,121.00987],[13.85963,121.00984],[13.85967,121.00982],
  [13.85971,121.00980],[13.85974,121.00979],[13.86000,121.00978],
  [13.86051,121.00978],[13.86059,121.00977],[13.86066,121.00975],
  [13.86072,121.00971]
];

// ════════════════════════════════════════════════
// STRUCTURE DEFINITIONS
// ════════════════════════════════════════════════
const DEFS = [
  {id:'feedlot1', name:'Feedlot 1', icon:'🐄', w:9, h:12, color:'#f0a500', init:[13.86030,121.00918]},
  {id:'feedlot2', name:'Feedlot 2', icon:'🐄', w:9, h:12, color:'#f0a500', init:[13.86000,121.00918]},
  {id:'feedlot3', name:'Feedlot 3', icon:'🐄', w:9, h:12, color:'#f0a500', init:[13.85970,121.00918]},
  {id:'feedlot4', name:'Feedlot 4', icon:'🐄', w:9, h:12, color:'#f0a500', init:[13.85940,121.00918]},
  {id:'feedlot5', name:'Feedlot 5', icon:'🐄', w:9, h:12, color:'#f0a500', init:[13.85910,121.00918]},
  {id:'bunker1',  name:'Bunker 1',  icon:'🌾', w:6, h:6,  color:'#58a6ff', init:[13.86030,121.00950]},
  {id:'bunker2',  name:'Bunker 2',  icon:'🌾', w:6, h:6,  color:'#58a6ff', init:[13.86000,121.00950]},
  {id:'bunker3',  name:'Bunker 3',  icon:'🌾', w:6, h:6,  color:'#58a6ff', init:[13.85970,121.00950]},
  {id:'bunker4',  name:'Bunker 4',  icon:'🌾', w:6, h:6,  color:'#58a6ff', init:[13.85940,121.00950]},
  {id:'bunker5',  name:'Bunker 5',  icon:'🌾', w:6, h:6,  color:'#58a6ff', init:[13.85910,121.00950]},
  {id:'barracks', name:'Barracks',  icon:'🏠', w:10,h:6,  color:'#56d364', init:[13.85885,121.00935]},
];

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
const S = {};
DEFS.forEach(d => {
  S[d.id] = { ...d, lat: d.init[0], lng: d.init[1], angle: 0 };
});

// ════════════════════════════════════════════════
// GEOMETRY HELPERS
// ════════════════════════════════════════════════
// Returns 4 corners as [[lat,lng],...] rotated by s.angle around center
function getCorners(s) {
  const hw = (s.w / 2) * LNG_M;   // half-width in degrees (lng axis)
  const hh = (s.h / 2) * LAT_M;   // half-height in degrees (lat axis)
  const θ  = s.angle * DEG2R;
  const cosθ = Math.cos(θ), sinθ = Math.sin(θ);

  // Offsets from center: [dlng, dlat] for each corner
  const raw = [[-hw, -hh], [hw, -hh], [hw, hh], [-hw, hh]];
  return raw.map(([dx, dy]) => [
    s.lat + dx * sinθ + dy * cosθ,   // rotated lat
    s.lng + dx * cosθ - dy * sinθ,   // rotated lng
  ]);
}

// Bounding box of the rotated polygon (for fitBounds / zoom)
function bnd(s) {
  const c = getCorners(s);
  const lats = c.map(p => p[0]), lngs = c.map(p => p[1]);
  return [[Math.min(...lats), Math.min(...lngs)],
          [Math.max(...lats), Math.max(...lngs)]];
}

// ════════════════════════════════════════════════
// MAP SETUP
// ════════════════════════════════════════════════
const map = L.map('map', {
  center: [13.8597, 121.00948],
  zoom: 18,
  zoomControl: true,
});

L.tileLayer(
  'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
  { attribution:'© Google', maxZoom:22 }
).addTo(map);

// GE_Plot reference boundary (amber dashed)
L.polygon(GE_PLOT, {
  color:'#f0a500', weight:2, dashArray:'7 4',
  fillColor:'#f0a500', fillOpacity:.06, interactive:false,
}).addTo(map);

// Map legend
const legend = L.control({position:'topright'});
legend.onAdd = () => {
  const d = L.DomUtil.create('div','map-legend');
  d.innerHTML = `
    <div class="leg-row">
      <div class="leg-line" style="border-bottom:2px dashed #f0a500"></div>
      <span style="color:#d29922">GE_Plot Boundary</span>
    </div>
    <div class="leg-row" style="margin-top:5px;padding-top:5px;border-top:1px solid #21262d">
      <div class="leg-line" style="border-bottom:2px solid #f0a500"></div>
      <span style="color:#f0a500">Feedlots (×5)</span>
    </div>
    <div class="leg-row">
      <div class="leg-line" style="border-bottom:2px solid #58a6ff"></div>
      <span style="color:#58a6ff">Bunkers (×5)</span>
    </div>
    <div class="leg-row">
      <div class="leg-line" style="border-bottom:2px solid #56d364"></div>
      <span style="color:#56d364">Barracks (×1)</span>
    </div>
  `;
  return d;
};
legend.addTo(map);

// ════════════════════════════════════════════════
// CONTAINMENT CHECK (Ray Casting)
// ════════════════════════════════════════════════
function pip(lat, lng, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const [ai, bi] = poly[i];
    const [aj, bj] = poly[j];
    if (((ai > lat) !== (aj > lat)) &&
        (lng < (bj - bi) * (lat - ai) / (aj - ai) + bi))
      inside = !inside;
  }
  return inside;
}

function getStatus(s) {
  const corners = getCorners(s);
  const results = corners.map(([a, b]) => pip(a, b, GE_PLOT));
  if (results.every(Boolean))  return 'inside';
  if (results.some(Boolean))   return 'partial';
  return 'outside';
}

// ════════════════════════════════════════════════
// MAP LAYERS (Rotated Polygons + Tooltips)
// ════════════════════════════════════════════════
const layers = {};

function makeLabel(s) {
  return `${s.icon} ${s.w}×${s.h}m · ${s.angle}°`;
}

function initLayer(s) {
  const poly = L.polygon(getCorners(s), {
    color: s.color, weight: 2.5,
    fillColor: s.color, fillOpacity: .2,
    interactive: true,
  }).addTo(map);

  poly.bindTooltip(makeLabel(s), {
    permanent: true, direction: 'center',
    className: 'struct-tip', interactive: false,
  });

  poly.on('mouseover', () => { if (!dragging) map.getContainer().style.cursor = 'grab'; });
  poly.on('mouseout',  () => { if (!dragging) map.getContainer().style.cursor = ''; });

  poly.on('mousedown', e => {
    if (e.originalEvent.button !== 0) return;
    L.DomEvent.stopPropagation(e);
    dragging = s.id;
    lastLL   = e.latlng;
    map.dragging.disable();
    map.getContainer().style.cursor = 'grabbing';
    document.getElementById('card-' + s.id)?.classList.add('dragging');
  });

  layers[s.id] = { poly };
}

function syncLayer(s) {
  const { poly } = layers[s.id];
  poly.setLatLngs(getCorners(s));
  poly.setTooltipContent(makeLabel(s));
  try { poly.openTooltip(L.latLng(s.lat, s.lng)); } catch(e) {}
}

// ════════════════════════════════════════════════
// DRAG HANDLING
// ════════════════════════════════════════════════
let dragging = null, lastLL = null;

map.on('mousemove', e => {
  if (!dragging) return;
  const s = S[dragging];
  s.lat += e.latlng.lat - lastLL.lat;
  s.lng += e.latlng.lng - lastLL.lng;
  lastLL  = e.latlng;
  syncLayer(s);
  updateCard(s);
});

function stopDrag() {
  if (!dragging) return;
  document.getElementById('card-' + dragging)?.classList.remove('dragging');
  dragging = null; lastLL = null;
  map.dragging.enable();
  map.getContainer().style.cursor = '';
}
map.on('mouseup', stopDrag);
document.addEventListener('mouseup', stopDrag);

// ════════════════════════════════════════════════
// SIDEBAR CARDS
// ════════════════════════════════════════════════
function buildCards() {
  const wrap = document.getElementById('cards');
  wrap.innerHTML = '';
  DEFS.forEach(d => {
    const s = S[d.id];
    const el = document.createElement('div');
    el.className = 'card';
    el.id = 'card-' + d.id;
    el.style.setProperty('--c', d.color);
    el.innerHTML = `
      <div class="card-head">
        <div>
          <div class="card-name" onclick="zoomTo('${d.id}')">${d.name}</div>
          <div class="card-dims"><em>${d.w}m × ${d.h}m</em> &nbsp;·&nbsp; ${d.w * d.h} sqm</div>
        </div>
        <div class="card-icon">${d.icon}</div>
      </div>
      <div><span class="status" id="st-${d.id}">—</span></div>
      <div class="card-coord" id="co-${d.id}">—</div>
      <div class="rot-row">
        <button class="rot-btn" onclick="nudge('${d.id}',-15)" title="-15°">↶</button>
        <button class="rot-btn" onclick="nudge('${d.id}',-5)" title="-5°">‹</button>
        <input type="range" class="rot-slider" id="sl-${d.id}" min="0" max="355" step="5" value="0"
               oninput="setAngle('${d.id}',+this.value)"/>
        <button class="rot-btn" onclick="nudge('${d.id}',5)" title="+5°">›</button>
        <button class="rot-btn" onclick="nudge('${d.id}',15)" title="+15°">↷</button>
        <span class="rot-angle" id="ang-${d.id}">0°</span>
      </div>
      <div class="card-btns" style="margin-top:6px">
        <button class="btn" onclick="setAngle('${d.id}',0)">0°</button>
        <button class="btn" onclick="setAngle('${d.id}',45)">45°</button>
        <button class="btn" onclick="setAngle('${d.id}',90)">90°</button>
        <button class="btn" onclick="zoomTo('${d.id}')">⤢ Zoom</button>
      </div>
    `;
    wrap.appendChild(el);
  });
  DEFS.forEach(d => updateCard(S[d.id]));
}

function updateCard(s) {
  const stEl  = document.getElementById('st-' + s.id);
  const coEl  = document.getElementById('co-' + s.id);
  const angEl = document.getElementById('ang-' + s.id);
  const slEl  = document.getElementById('sl-' + s.id);
  if (!stEl) return;

  const statusCfg = {
    inside:  { cls:'st-in',  txt:'✓ Inside GE_Plot' },
    partial: { cls:'st-pt',  txt:'⚠ Partially outside' },
    outside: { cls:'st-out', txt:'✗ Outside GE_Plot' },
  };
  const { cls, txt } = statusCfg[getStatus(s)];
  stEl.className = 'status ' + cls;
  stEl.textContent = txt;
  coEl.textContent = `${s.lat.toFixed(6)}°N  ${s.lng.toFixed(6)}°E`;
  if (angEl) angEl.textContent = s.angle + '°';
  if (slEl) slEl.value = s.angle;

  updateChips();
}

function updateChips() {
  const total = DEFS.reduce((acc, d) => acc + S[d.id].w * S[d.id].h, 0);
  const pct   = (total / 14922 * 100).toFixed(2);
  document.getElementById('fp-chip').textContent  = `FOOTPRINT — ${total} sqm`;
  document.getElementById('pct-chip').textContent = `${pct}% USED`;
}

// ════════════════════════════════════════════════
// ROTATION CONTROLS
// ════════════════════════════════════════════════
function setAngle(id, deg) {
  const s = S[id];
  s.angle = ((deg % 360) + 360) % 360;
  syncLayer(s);
  updateCard(s);
}

function nudge(id, delta) {
  setAngle(id, S[id].angle + delta);
}

function zoomTo(id) {
  map.fitBounds(bnd(S[id]), { padding: [80, 80] });
}

function resetAll() {
  DEFS.forEach(d => {
    const s = S[d.id];
    s.lat = d.init[0]; s.lng = d.init[1]; s.angle = 0;
    syncLayer(s);
    updateCard(s);
  });
}

// ════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════
DEFS.forEach(d => initLayer(S[d.id]));
buildCards();
</script>
</body>
</html>
